<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="860" font-family="Arial, Helvetica, sans-serif">
  <rect width="1200" height="860" fill="#F8F7F4"/>
  <rect x="0" y="0" width="1200" height="70" fill="#7C3AED"/>
  <text x="600" y="32" text-anchor="middle" fill="white" font-size="22" font-weight="bold">Smart Campus - Frontend Architecture</text>
  <text x="600" y="56" text-anchor="middle" fill="#DDD6FE" font-size="14">React 19 - Vite - React Router 7 - Axios - Context API</text>

  <rect x="480" y="90" width="240" height="54" rx="10" fill="#7C3AED" stroke="#5B21B6" stroke-width="2"/>
  <text x="600" y="112" text-anchor="middle" fill="white" font-size="13" font-weight="bold">main.jsx - Entry Point</text>
  <text x="600" y="130" text-anchor="middle" fill="#DDD6FE" font-size="11">StrictMode - BrowserRouter - GoogleOAuthProvider - App</text>
  <line x1="600" y1="144" x2="600" y2="164" stroke="#7C3AED" stroke-width="2" marker-end="url(#av)"/>

  <rect x="380" y="166" width="440" height="52" rx="10" fill="#6D28D9" stroke="#5B21B6" stroke-width="2"/>
  <text x="600" y="187" text-anchor="middle" fill="white" font-size="13" font-weight="bold">App.jsx - Routes Root</text>
  <text x="600" y="205" text-anchor="middle" fill="#DDD6FE" font-size="11">AppRoutes rendered inside AuthProvider and NotificationProvider</text>

  <line x1="450" y1="218" x2="310" y2="246" stroke="#7C3AED" stroke-width="1.5" marker-end="url(#av)"/>
  <line x1="750" y1="218" x2="890" y2="246" stroke="#7C3AED" stroke-width="1.5" marker-end="url(#av)"/>

  <rect x="130" y="247" width="280" height="94" rx="10" fill="white" stroke="#7C3AED" stroke-width="2"/>
  <text x="270" y="268" text-anchor="middle" fill="#581C87" font-size="12" font-weight="bold">AuthContext</text>
  <text x="270" y="286" text-anchor="middle" fill="#374151" font-size="10">currentUser - authLoading - isAuthenticated</text>
  <text x="270" y="300" text-anchor="middle" fill="#374151" font-size="10">login() - oauthLogin() - logout()</text>
  <text x="270" y="314" text-anchor="middle" fill="#374151" font-size="10">reads current user from localStorage</text>
  <text x="270" y="328" text-anchor="middle" fill="#9CA3AF" font-size="9">uses authApi for /auth/login and /auth/oauth</text>

  <rect x="790" y="247" width="280" height="94" rx="10" fill="white" stroke="#7C3AED" stroke-width="2"/>
  <text x="930" y="268" text-anchor="middle" fill="#581C87" font-size="12" font-weight="bold">NotificationContext</text>
  <text x="930" y="286" text-anchor="middle" fill="#374151" font-size="10">notifications[] - unreadCount - recentNotifications</text>
  <text x="930" y="300" text-anchor="middle" fill="#374151" font-size="10">refreshNotifications() - markAsRead() - markAllAsRead()</text>
  <text x="930" y="314" text-anchor="middle" fill="#374151" font-size="10">reloads when currentUser changes</text>
  <text x="930" y="328" text-anchor="middle" fill="#9CA3AF" font-size="9">uses /notifications?userId=... style API calls</text>

  <line x1="600" y1="218" x2="600" y2="352" stroke="#7C3AED" stroke-width="1.5" marker-end="url(#av)"/>
  <rect x="370" y="353" width="460" height="58" rx="10" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="600" y="374" text-anchor="middle" fill="#581C87" font-size="12" font-weight="bold">Routing and Guards</text>
  <text x="405" y="392" fill="#374151" font-size="10" font-weight="bold">ProtectedRoute</text>
  <text x="405" y="404" fill="#6B7280" font-size="9">redirects unauthenticated users to /login</text>
  <text x="560" y="392" fill="#374151" font-size="10" font-weight="bold">RoleRoute</text>
  <text x="560" y="404" fill="#6B7280" font-size="9">checks USER / ADMIN / TECHNICIAN access</text>
  <text x="735" y="392" fill="#374151" font-size="10" font-weight="bold">HomeRoute</text>
  <text x="735" y="404" fill="#6B7280" font-size="9">role-based redirect after login</text>

  <line x1="600" y1="411" x2="600" y2="430" stroke="#374151" stroke-width="1.5" marker-end="url(#av)"/>
  <rect x="300" y="431" width="600" height="52" rx="10" fill="white" stroke="#374151" stroke-width="2"/>
  <text x="600" y="452" text-anchor="middle" fill="#1F2937" font-size="13" font-weight="bold">AppShell.jsx</text>
  <text x="600" y="470" text-anchor="middle" fill="#374151" font-size="11">Navbar + Sidebar + Outlet powered application shell</text>

  <line x1="430" y1="483" x2="300" y2="504" stroke="#374151" stroke-width="1.5" marker-end="url(#av)"/>
  <rect x="100" y="505" width="200" height="128" rx="10" fill="white" stroke="#374151" stroke-width="1.5"/>
  <text x="200" y="525" text-anchor="middle" fill="#1F2937" font-size="11" font-weight="bold">Layout Components</text>
  <text x="200" y="541" text-anchor="middle" fill="#374151" font-size="10">Sidebar.jsx</text>
  <text x="200" y="555" text-anchor="middle" fill="#374151" font-size="10">Navbar.jsx</text>
  <text x="200" y="569" text-anchor="middle" fill="#374151" font-size="10">PageContainer.jsx</text>
  <text x="200" y="583" text-anchor="middle" fill="#374151" font-size="10">navigation built from role constants</text>
  <text x="200" y="603" text-anchor="middle" fill="#9CA3AF" font-size="9">notification bell reads from NotificationContext</text>

  <text x="600" y="505" text-anchor="middle" fill="#374151" font-size="11" font-weight="bold">Pages rendered through &lt;Outlet /&gt;</text>
  <line x1="600" y1="510" x2="600" y2="526" stroke="#374151" stroke-width="1.5" marker-end="url(#av)"/>

  <rect x="318" y="527" width="168" height="82" rx="8" fill="#FEF3C7" stroke="#D97706" stroke-width="1.5"/>
  <text x="402" y="546" text-anchor="middle" fill="#78350F" font-size="11" font-weight="bold">Auth Pages</text>
  <text x="402" y="562" text-anchor="middle" fill="#374151" font-size="10">LoginPage.jsx</text>
  <text x="402" y="576" text-anchor="middle" fill="#374151" font-size="10">Google login trigger</text>
  <text x="402" y="590" text-anchor="middle" fill="#374151" font-size="10">Unauthorized / NotFound</text>
  <text x="402" y="602" text-anchor="middle" fill="#9CA3AF" font-size="9">no callback page in current repo</text>

  <rect x="498" y="527" width="208" height="82" rx="8" fill="#DBEAFE" stroke="#1D4ED8" stroke-width="1.5"/>
  <text x="602" y="546" text-anchor="middle" fill="#1E3A8A" font-size="11" font-weight="bold">User and Shared Pages</text>
  <text x="602" y="562" text-anchor="middle" fill="#374151" font-size="10">Dashboard - Resources - Resource Details</text>
  <text x="602" y="576" text-anchor="middle" fill="#374151" font-size="10">Create Booking - My Bookings</text>
  <text x="602" y="590" text-anchor="middle" fill="#374151" font-size="10">Create Ticket - My Tickets - Ticket Details</text>
  <text x="602" y="602" text-anchor="middle" fill="#374151" font-size="10">Profile - Notifications - Ticket Rating</text>

  <rect x="718" y="527" width="154" height="82" rx="8" fill="#FDF4FF" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="795" y="546" text-anchor="middle" fill="#581C87" font-size="11" font-weight="bold">Technician Pages</text>
  <text x="795" y="562" text-anchor="middle" fill="#374151" font-size="10">TechnicianDashboardPage</text>
  <text x="795" y="576" text-anchor="middle" fill="#374151" font-size="10">AssignedTicketsPage</text>
  <text x="795" y="590" text-anchor="middle" fill="#374151" font-size="10">ResolutionNotesPage</text>
  <text x="795" y="602" text-anchor="middle" fill="#9CA3AF" font-size="9">TECHNICIAN only routes</text>

  <rect x="884" y="505" width="286" height="128" rx="8" fill="#ECFDF5" stroke="#10B981" stroke-width="1.5"/>
  <text x="1027" y="525" text-anchor="middle" fill="#065F46" font-size="11" font-weight="bold">Admin Pages</text>
  <text x="1027" y="542" text-anchor="middle" fill="#374151" font-size="10">AdminDashboardPage</text>
  <text x="1027" y="558" text-anchor="middle" fill="#374151" font-size="10">ManageResourcesPage - PendingBookingsPage - AllBookingsPage</text>
  <text x="1027" y="574" text-anchor="middle" fill="#374151" font-size="10">ManageTicketsPage - AssignTechnicianPage</text>
  <text x="1027" y="590" text-anchor="middle" fill="#374151" font-size="10">UserManagementPage</text>
  <text x="1027" y="610" text-anchor="middle" fill="#9CA3AF" font-size="9">wrapped in RoleRoute with ADMIN access only</text>

  <rect x="50" y="647" width="700" height="92" rx="10" fill="white" stroke="#374151" stroke-width="1.5"/>
  <text x="400" y="668" text-anchor="middle" fill="#1F2937" font-size="12" font-weight="bold">Shared UI Components</text>
  <text x="120" y="691" text-anchor="middle" fill="#374151" font-size="10" font-weight="bold">PageHeader</text>
  <text x="120" y="705" text-anchor="middle" fill="#6B7280" font-size="9">section titles</text>
  <text x="120" y="717" text-anchor="middle" fill="#6B7280" font-size="9">action areas</text>
  <text x="240" y="691" text-anchor="middle" fill="#374151" font-size="10" font-weight="bold">StatCard</text>
  <text x="240" y="705" text-anchor="middle" fill="#6B7280" font-size="9">dashboard metrics</text>
  <text x="240" y="717" text-anchor="middle" fill="#6B7280" font-size="9">summary cards</text>
  <text x="360" y="691" text-anchor="middle" fill="#374151" font-size="10" font-weight="bold">GlassCard</text>
  <text x="360" y="705" text-anchor="middle" fill="#6B7280" font-size="9">surface wrapper</text>
  <text x="360" y="717" text-anchor="middle" fill="#6B7280" font-size="9">shared styling</text>
  <text x="480" y="691" text-anchor="middle" fill="#374151" font-size="10" font-weight="bold">Loading / Error / Empty</text>
  <text x="480" y="705" text-anchor="middle" fill="#6B7280" font-size="9">state components</text>
  <text x="480" y="717" text-anchor="middle" fill="#6B7280" font-size="9">reused across pages</text>
  <text x="620" y="691" text-anchor="middle" fill="#374151" font-size="10" font-weight="bold">Feature Components</text>
  <text x="620" y="705" text-anchor="middle" fill="#6B7280" font-size="9">booking, ticket, resource,</text>
  <text x="620" y="717" text-anchor="middle" fill="#6B7280" font-size="9">notification specific forms/cards</text>

  <rect x="770" y="647" width="410" height="92" rx="10" fill="white" stroke="#0F6E56" stroke-width="1.5"/>
  <text x="975" y="668" text-anchor="middle" fill="#065F46" font-size="12" font-weight="bold">API Layer</text>
  <text x="850" y="691" text-anchor="middle" fill="#374151" font-size="10" font-weight="bold">axios.js</text>
  <text x="850" y="705" text-anchor="middle" fill="#6B7280" font-size="9">baseURL + timeout</text>
  <text x="850" y="717" text-anchor="middle" fill="#6B7280" font-size="9">JWT interceptor</text>
  <text x="945" y="691" text-anchor="middle" fill="#374151" font-size="10" font-weight="bold">authApi</text>
  <text x="945" y="705" text-anchor="middle" fill="#6B7280" font-size="9">login / oauth / register</text>
  <text x="945" y="717" text-anchor="middle" fill="#6B7280" font-size="9">user persistence</text>
  <text x="1045" y="691" text-anchor="middle" fill="#374151" font-size="10" font-weight="bold">resourceApi + bookingApi</text>
  <text x="1045" y="705" text-anchor="middle" fill="#6B7280" font-size="9">resource CRUD</text>
  <text x="1045" y="717" text-anchor="middle" fill="#6B7280" font-size="9">availability + approvals</text>
  <text x="1145" y="691" text-anchor="middle" fill="#374151" font-size="10" font-weight="bold">ticketApi + notificationApi</text>
  <text x="1145" y="705" text-anchor="middle" fill="#6B7280" font-size="9">comments, resolve, rate</text>
  <text x="1145" y="717" text-anchor="middle" fill="#6B7280" font-size="9">mark read / read-all</text>

  <rect x="50" y="757" width="700" height="78" rx="10" fill="white" stroke="#6B7280" stroke-width="1.5"/>
  <text x="400" y="776" text-anchor="middle" fill="#1F2937" font-size="12" font-weight="bold">Utilities and Styling</text>
  <text x="175" y="798" text-anchor="middle" fill="#374151" font-size="10" font-weight="bold">formatters.js</text>
  <text x="175" y="812" text-anchor="middle" fill="#6B7280" font-size="9">date/time formatting helpers</text>
  <text x="175" y="824" text-anchor="middle" fill="#6B7280" font-size="9">status display support</text>
  <text x="400" y="798" text-anchor="middle" fill="#374151" font-size="10" font-weight="bold">bookingPdf.js + resourceUsagePdf.js</text>
  <text x="400" y="812" text-anchor="middle" fill="#6B7280" font-size="9">browser-side PDF generation</text>
  <text x="400" y="824" text-anchor="middle" fill="#6B7280" font-size="9">downloadable reports</text>
  <text x="620" y="798" text-anchor="middle" fill="#374151" font-size="10" font-weight="bold">index.css</text>
  <text x="620" y="812" text-anchor="middle" fill="#6B7280" font-size="9">global design styles</text>
  <text x="620" y="824" text-anchor="middle" fill="#6B7280" font-size="9">Tailwind + custom rules</text>

  <rect x="770" y="757" width="410" height="78" rx="10" fill="white" stroke="#6B7280" stroke-width="1.5"/>
  <text x="975" y="776" text-anchor="middle" fill="#1F2937" font-size="12" font-weight="bold">Build and Environment</text>
  <text x="875" y="798" text-anchor="middle" fill="#374151" font-size="10" font-weight="bold">vite.config.js</text>
  <text x="875" y="812" text-anchor="middle" fill="#6B7280" font-size="9">React plugin + Tailwind plugin</text>
  <text x="875" y="824" text-anchor="middle" fill="#6B7280" font-size="9">no proxy configured currently</text>
  <text x="975" y="798" text-anchor="middle" fill="#374151" font-size="10" font-weight="bold">package.json</text>
  <text x="975" y="812" text-anchor="middle" fill="#6B7280" font-size="9">React 19 - Router 7 - Axios</text>
  <text x="975" y="824" text-anchor="middle" fill="#6B7280" font-size="9">Google OAuth - Framer Motion</text>
  <text x="1115" y="798" text-anchor="middle" fill="#374151" font-size="10" font-weight="bold">Environment</text>
  <text x="1115" y="812" text-anchor="middle" fill="#6B7280" font-size="9">VITE_API_BASE_URL</text>
  <text x="1115" y="824" text-anchor="middle" fill="#6B7280" font-size="9">VITE_GOOGLE_CLIENT_ID</text>

  <defs>
    <marker id="av" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#7C3AED" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
</svg>
