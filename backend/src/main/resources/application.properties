spring.application.name=backend
server.port=8080

# MongoDB Configuration
# Default to local MongoDB for development. Override with SPRING_DATA_MONGODB_URI or MONGODB_URI
# when using MongoDB Atlas or another external deployment.
spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI:${MONGODB_URI:mongodb://127.0.0.1:27017}}
spring.data.mongodb.database=${MONGODB_DATABASE:smart_campus}

# JWT Security Configuration
nexora.jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
nexora.jwt.expiration=86400000
auth.student-email-domain=${AUTH_STUDENT_EMAIL_DOMAIN:my.sliit.lk}
auth.staff-email-domain=${AUTH_STAFF_EMAIL_DOMAIN:sliit.lk}

# Logging
logging.level.org.springframework.data.mongodb=DEBUG
logging.level.com.smartcampus.backend=DEBUG
